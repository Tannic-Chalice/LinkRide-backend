spring.application.name=backend

server.port=8080

# Supabase PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://db.jqutdscflwqbbqxtebkw.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}

# JPA/Hibernate Config
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB Atlas Configuration (Loaded from .env)
spring.data.mongodb.uri=${MONGO_URI}

# Supabase JWT Secret for verification (Loaded from .env)
supabase.jwt.secret=${SUPABASE_JWT_SECRET}